name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create the GitHub release as a draft"
        type: boolean
        default: true
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Linux x64
            platform: ubuntu-22.04
            target: ""
            args: ""
          - name: Windows x64
            platform: windows-latest
            target: ""
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLIPORAX_BUILD_TARGET: ${{ matrix.target }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v__VERSION__' }}
          releaseName: Cliporax v__VERSION__
          releaseBody: See the assets below to download the installer for your platform.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generateReleaseNotes: true
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}
