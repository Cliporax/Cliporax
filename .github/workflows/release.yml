name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create the GitHub release as a draft"
        type: boolean
        default: true
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - name: Linux x64
            platform: ubuntu-22.04
            target: ""
            args: --bundles deb rpm appimage
          - name: Windows x64
            platform: windows-latest
            target: ""
            args: --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate release notes
        id: release-notes
        shell: pwsh
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "v__VERSION__"
          }

          $previousTag = git tag --sort=-creatordate | Where-Object { $_ -ne $tag } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $range = "HEAD"
          } else {
            $range = "$previousTag..HEAD"
          }

          $changes = @(git log --pretty=format:"%s" $range | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -First 20)
          if ($changes.Count -eq 0) {
            $changes = @("Release build and packaging updates")
          }

          $body = @(
            "## Main changes",
            "",
            ($changes | ForEach-Object { "- $_" }),
            "",
            "## Downloads",
            "",
            "Download the installer or portable package for your platform from the assets below."
          ) -join "`n"

          "body<<EOF" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLIPORAX_BUILD_TARGET: ${{ matrix.target }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v__VERSION__' }}
          releaseName: Cliporax v__VERSION__
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generateReleaseNotes: true
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}

      - name: Package Windows portable app
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $portableDir = "src-tauri/target/release/portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item "src-tauri/target/release/cliporax.exe" "$portableDir/Cliporax.exe"
          Copy-Item "src-tauri/bin/cliporax-cli-x86_64-pc-windows-msvc.exe" "$portableDir/cliporax-cli-x86_64-pc-windows-msvc.exe"
          Compress-Archive -Path "$portableDir/*" -DestinationPath "src-tauri/target/release/Cliporax_${{ github.ref_name }}_windows_x64_portable.zip" -Force

      - name: Upload Windows portable app
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/Cliporax_${{ github.ref_name }}_windows_x64_portable.zip
