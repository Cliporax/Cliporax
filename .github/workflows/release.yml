name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create the GitHub release as a draft"
        type: boolean
        default: true
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - name: Linux x64
            platform: ubuntu-22.04
            target: ""
            args: --bundles deb rpm appimage
          - name: Windows x64
            platform: windows-latest
            target: ""
            args: --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Install frontend dependencies
        run: npm ci

      - name: Detect macOS signing secrets
        id: mac-signing
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'available=false\n' >> "$GITHUB_OUTPUT"
            printf 'Missing macOS signing/notarization secrets: %s\n' "${missing[*]}"
            printf 'A compile-check .app archive will be uploaded as a workflow artifact; no unsigned DMG will be published.\n'
            {
              printf '### macOS release asset skipped\n\n'
              printf 'Missing signing/notarization secrets: `%s`.\n\n' "${missing[*]}"
              printf 'The unsigned `.app` artifact is for CI inspection only and is not attached to the GitHub release.\n'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            printf 'available=true\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: release-notes
        shell: pwsh
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "v1.1.0"
          }

          $previousTag = git tag --sort=-creatordate | Where-Object { $_ -ne $tag } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $range = "HEAD"
          } else {
            $range = "$previousTag..HEAD"
          }

          $subjects = @(git log --pretty=format:"%s" $range | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          $changes = New-Object System.Collections.Generic.List[string]
          $hasBugFix = $false

          foreach ($subject in $subjects) {
            if ($subject -match '^feat(?:\([^)]+\))?:\s*(.+)$') {
              $changes.Add("- 新功能：$($Matches[1])")
              continue
            }

            if ($subject -match '^fix(?:\([^)]+\))?!?:\s*(.+)$') {
              $fixText = $Matches[1]
              if ($subject -match '^fix(?:\([^)]+\))?!:' -or $fixText -match '(严重|崩溃|crash|critical|security|安全|data loss|数据丢失)') {
                $changes.Add("- 修复：$fixText")
              } else {
                $hasBugFix = $true
              }
            }
          }

          if ($hasBugFix) {
            $changes.Add("- 修复一下bug")
          }

          $changes = @($changes | Select-Object -Unique | Select-Object -First 20)
          if ($changes.Count -eq 0) {
            $changes = @("- 本次没有需要展示的主要修改。")
          }

          $bodyLines = New-Object System.Collections.Generic.List[string]
          $bodyLines.Add("## 主要修改")
          $bodyLines.Add("")
          foreach ($change in $changes) {
            $bodyLines.Add($change)
          }
          $bodyLines.Add("")
          $bodyLines.Add("## 下载")
          $bodyLines.Add("")
          $bodyLines.Add("请从下方 Assets 下载对应平台的安装包或便携版。")
          $body = $bodyLines -join "`n"

          "body<<EOF" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Build and upload Tauri bundles
        if: ${{ !startsWith(matrix.platform, 'macos') || steps.mac-signing.outputs.available == 'true' }}
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLIPORAX_BUILD_TARGET: ${{ matrix.target }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.1.0' }}
          releaseName: Cliporax v1.1.0
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generateReleaseNotes: true
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}

      - name: Build unsigned macOS app for compile verification
        if: ${{ startsWith(matrix.platform, 'macos') && steps.mac-signing.outputs.available != 'true' }}
        shell: bash
        run: npm run tauri build -- --target "${{ matrix.target }}" --bundles app

      - name: Archive unsigned macOS app
        if: ${{ startsWith(matrix.platform, 'macos') && steps.mac-signing.outputs.available != 'true' }}
        shell: bash
        run: |
          app_path="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Cliporax.app"
          archive_path="src-tauri/target/${{ matrix.target }}/release/Cliporax_${{ matrix.target }}_unsigned.zip"
          test -d "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$archive_path"

      - name: Upload unsigned macOS compile artifact
        if: ${{ startsWith(matrix.platform, 'macos') && steps.mac-signing.outputs.available != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Cliporax-${{ matrix.target }}-unsigned
          path: src-tauri/target/${{ matrix.target }}/release/Cliporax_${{ matrix.target }}_unsigned.zip
          if-no-files-found: error

      - name: Package Windows portable app
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $portableDir = "src-tauri/target/release/portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item "src-tauri/target/release/cliporax.exe" "$portableDir/Cliporax.exe"
          Copy-Item "src-tauri/bin/cliporax-cli-x86_64-pc-windows-msvc.exe" "$portableDir/cliporax-cli-x86_64-pc-windows-msvc.exe"
          Compress-Archive -Path "$portableDir/*" -DestinationPath "src-tauri/target/release/Cliporax_${{ github.ref_name }}_windows_x64_portable.zip" -Force

      - name: Upload Windows portable app
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/Cliporax_${{ github.ref_name }}_windows_x64_portable.zip
