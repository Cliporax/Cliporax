name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create the GitHub release as a draft"
        type: boolean
        default: false
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            platform: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - name: Linux x64
            platform: ubuntu-22.04
            target: ""
            args: --bundles deb rpm appimage
          - name: Windows x64
            platform: windows-latest
            target: ""
            args: --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate release notes
        id: release-notes
        shell: pwsh
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $package = Get-Content package.json -Raw | ConvertFrom-Json
            $tag = "v$($package.version)"
          }

          $tagExists = -not [string]::IsNullOrWhiteSpace((git tag --list $tag))
          if ($tagExists) {
            $previousTag = git describe --tags --abbrev=0 "$tag^" 2>$null
          } else {
            $previousTag = git describe --tags --abbrev=0 HEAD 2>$null
          }
          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $previousTag = git tag --sort=-creatordate | Where-Object { $_ -ne $tag } | Select-Object -First 1
          }
          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $range = "HEAD"
          } elseif ($tagExists) {
            $range = "$previousTag..$tag"
          } else {
            $range = "$previousTag..HEAD"
          }

          $subjects = @(git log --pretty=format:"%s" $range | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          $changes = New-Object System.Collections.Generic.List[string]
          $ignoredPattern = '^(?:chore|ci|build)(?:\([^)]+\))?:\s*(?:update|bump) version\b|^(?:update|bump) version\b|^release\b'

          foreach ($subject in $subjects) {
            if ($subject -match $ignoredPattern) {
              continue
            }

            if ($subject -match '^feat(?:\([^)]+\))?:\s*(.+)$') {
              $changes.Add("- 新功能：$($Matches[1])")
              continue
            }

            if ($subject -match '^fix(?:\([^)]+\))?!?:\s*(.+)$') {
              $changes.Add("- 修复：$($Matches[1])")
              continue
            }

            if ($subject -match '^(?:perf|refactor)(?:\([^)]+\))?!?:\s*(.+)$') {
              $changes.Add("- 改进：$($Matches[1])")
              continue
            }

            if ($subject -match '^(?:build|ci|chore)(?:\([^)]+\))?!?:\s*(.+)$') {
              $changes.Add("- 维护：$($Matches[1])")
              continue
            }

            if ($subject -match '^(?:docs)(?:\([^)]+\))?!?:\s*(.+)$') {
              $changes.Add("- 文档：$($Matches[1])")
              continue
            }

            $changes.Add("- 更新：$subject")
          }

          $changes = @($changes | Select-Object -Unique | Select-Object -First 20)
          if ($changes.Count -eq 0) {
            $changes = @("- 本次没有需要展示的主要修改。")
          }

          $bodyLines = New-Object System.Collections.Generic.List[string]
          $bodyLines.Add("## 主要修改")
          $bodyLines.Add("")
          foreach ($change in $changes) {
            $bodyLines.Add($change)
          }
          $bodyLines.Add("")
          $bodyLines.Add("## 下载")
          $bodyLines.Add("")
          $bodyLines.Add("请从下方 Assets 下载对应平台的安装包或便携版。")
          $body = $bodyLines -join "`n"

          "body<<EOF" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=Cliporax $tag" >> $env:GITHUB_OUTPUT

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLIPORAX_BUILD_TARGET: ${{ matrix.target }}
          # Ad-hoc sign macOS apps so Apple Silicon can run them without a
          # Developer ID. The DMG remains unnotarized and may require users to
          # allow it in Privacy & Security on first launch.
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && '-' || '' }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ steps.release-notes.outputs.tag }}
          releaseName: ${{ steps.release-notes.outputs.release_name }}
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generateReleaseNotes: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}

      - name: Package Windows portable app
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $portableDir = "src-tauri/target/release/portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item "src-tauri/target/release/cliporax.exe" "$portableDir/Cliporax.exe"
          Copy-Item "src-tauri/bin/cliporax-cli-x86_64-pc-windows-msvc.exe" "$portableDir/cliporax-cli-x86_64-pc-windows-msvc.exe"
          Compress-Archive -Path "$portableDir/*" -DestinationPath "src-tauri/target/release/Cliporax_${{ github.ref_name }}_windows_x64_portable.zip" -Force

      - name: Upload Windows portable app
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/Cliporax_${{ github.ref_name }}_windows_x64_portable.zip
