          var EXP = new Array(512);
          var LOG = new Array(256);
          var x = 1;
          for (var i = 0; i < 255; i++) {
            EXP[i] = x;
            LOG[x] = i;
            x <<= 1;
            if (x & 0x100) x ^= 0x11d;

          for (var i = 255; i < 512; i++) {
            EXP[i] = EXP[i - 255];
          }
          return { EXP: EXP, LOG: LOG };

        function gfMul(a, b) {
          if (a === 0 || b === 0) return 0;
          return GF.EXP[GF.LOG[a] + GF.LOG[b]];
        }

        function rsEncode(data, ecCount) {
          var gen = [1];
          for (var i = 0; i < ecCount; i++) {
            var newGen = new Array(gen.length + 1);
            newGen[0] = 0;
            for (var j = 0; j < gen.length; j++) {
              newGen[j] ^= gen[j];
              newGen[j + 1] = gfMul(gen[j], GF.EXP[i]);
            }
            gen = newGen;
          }

          var msgOut = data.slice();
          for (var i = 0; i < ecCount; i++) {
            msgOut.push(0);
          }

          for (var i = 0; i < data.length; i++) {
            var coef = msgOut[i];
            if (coef !== 0) {
              for (var j = 1; j < gen.length; j++) {
                msgOut[i + j] ^= gfMul(gen[j], coef);
              }
            }
          }

          return msgOut.slice(data.length);
        }

        function create(typeNumber, errorCorrectionLevel) {
          var modules = [];
          var moduleCount = typeNumber * 4 + 17;
          for (var i = 0; i < moduleCount; i++) {
            modules[i] = [];
            for (var j = 0; j < moduleCount; j++) {
              modules[i][j] = null;
            }
          }

          return {
            typeNumber: typeNumber,
            errorCorrectionLevel: errorCorrectionLevel,
            modules: modules,
            moduleCount: moduleCount,
            isDark: function (row, col) {
              return this.modules[row][col] === true;
            },
          };
        }

        function addFinderPattern(qr, row, col) {
          for (var r = -1; r <= 7; r++) {
            for (var c = -1; c <= 7; c++) {
              var nr = row + r;
              var nc = col + c;
              if (
                nr < 0 ||
                nc < 0 ||
                nr >= qr.moduleCount ||
                nc >= qr.moduleCount
              )
                continue;

              if (
                (0 <= r && r <= 6 && (c === 0 || c === 6)) ||
                (0 <= c && c <= 6 && (r === 0 || r === 6)) ||
                (2 <= r && r <= 4 && 2 <= c && c <= 4)
              ) {
                qr.modules[nr][nc] = true;
              } else {
                qr.modules[nr][nc] = false;
              }
            }
          }
        }

        function addAlignmentPattern(qr, row, col) {
          for (var r = -2; r <= 2; r++) {
            for (var c = -2; c <= 2; c++) {
              if (
                r === -2 ||
                r === 2 ||
                c === -2 ||
                c === 2 ||
                (r === 0 && c === 0)
              ) {
                qr.modules[row + r][col + c] = true;
              } else {
                qr.modules[row + r][col + c] = false;
              }
            }
          }
        }

        function addTimingPattern(qr) {
          for (var i = 8; i < qr.moduleCount - 8; i++) {
            if (qr.modules[6][i] === null) {
              qr.modules[6][i] = i % 2 === 0;
            }
            if (qr.modules[i][6] === null) {
              qr.modules[i][6] = i % 2 === 0;
            }
          }
        }

        function addDarkModule(qr) {
          qr.modules[qr.moduleCount - 8][8] = true;
        }

        function placeData(qr, data, maskPattern) {
          var bitIdx = 0;
          var size = qr.moduleCount;

          for (var col = size - 1; col >= 1; col -= 2) {
            if (col === 6) col = 5;

            for (var row = 0; row < size; row++) {
              for (var c = 0; c < 2; c++) {
                var actualCol = col - c;
                if (qr.modules[row][actualCol] === null) {
                  var dark = false;
                  if (bitIdx < data.length) {
                    dark = data[bitIdx] === 1;
                  }
                  if (getMask(maskPattern, row, actualCol)) {
                    dark = !dark;
                  }
                  qr.modules[row][actualCol] = dark;
                  bitIdx++;
                }
              }
            }
          }
        }

        function getMask(pattern, row, col) {
          switch (pattern) {
            case 0:
              return (row + col) % 2 === 0;
            case 1:
              return row % 2 === 0;
            case 2:
              return col % 3 === 0;
            case 3:
              return (row + col) % 3 === 0;
            case 4:
              return (Math.floor(row / 2) + Math.floor(col / 3)) % 2 === 0;
            case 5:
              return ((row * col) % 2) + ((row * col) % 3) === 0;
            case 6:
              return (((row * col) % 2) + ((row * col) % 3)) % 2 === 0;
            case 7:
              return (((row * col) % 3) + ((row + col) % 2)) % 2 === 0;
            default:
              return false;
          }
        }

            var dark = ((bits >> i) & 1) === 1;

              qr.modules[8][qr.moduleCount - 1 - i] = dark;
            } else {

          if (qr.typeNumber < 7) return;

          var bits = VERSION_INFO[qr.typeNumber - 7];

          for (var i = 0; i < 18; i++) {

          var minPenalty = Number.MAX_VALUE;
          var bestPattern = 0;

          for (var pattern = 0; pattern < 8; pattern++) {
            var testModules = [];
            for (var r = 0; r < qr.moduleCount; r++) {
              testModules[r] = [];
              for (var c = 0; c < qr.moduleCount; c++) {

            var tempQr = { modules: testModules, moduleCount: qr.moduleCount };
            placeData(tempQr, data, pattern);

            var penalty = calculatePenalty(tempQr);

            if (penalty < minPenalty) {
              minPenalty = penalty;
              bestPattern = pattern;
            }
          }

          return bestPattern;

        function calculatePenalty(qr) {
          var penalty = 0;

          for (var row = 0; row < qr.moduleCount; row++) {
            var count = 1;
            for (var col = 1; col < qr.moduleCount; col++) {
              if (qr.modules[row][col] === qr.modules[row][col - 1]) {
                count++;
              } else {
                if (count >= 5) penalty += count - 2;
                count = 1;
              }
            }
            if (count >= 5) penalty += count - 2;
          }

          for (var col = 0; col < qr.moduleCount; col++) {
            var count = 1;
            for (var row = 1; row < qr.moduleCount; row++) {
              if (qr.modules[row][col] === qr.modules[row - 1][col]) {
                count++;
              } else {
                if (count >= 5) penalty += count - 2;
                count = 1;
              }
            }
            if (count >= 5) penalty += count - 2;
          }

          for (var row = 0; row < qr.moduleCount - 1; row++) {
            for (var col = 0; col < qr.moduleCount - 1; col++) {
              var v = qr.modules[row][col];
              if (
                v === qr.modules[row][col + 1] &&
                v === qr.modules[row + 1][col] &&
                v === qr.modules[row + 1][col + 1]
              ) {
                penalty += 3;
              }
            }
          }

          return penalty;

        function encode(text, ecLevel) {

          var bytes = [];
          for (var i = 0; i < text.length; i++) {
            var c = text.charCodeAt(i);
            if (c < 128) {
              bytes.push(c);
            } else if (c < 2048) {
              bytes.push(192 | (c >> 6), 128 | (c & 63));
            } else if (c < 65536) {
              bytes.push(
                224 | (c >> 12),
                128 | ((c >> 6) & 63),
                128 | (c & 63),
              );
            } else {
              bytes.push(
                240 | (c >> 18),
                128 | ((c >> 12) & 63),
                128 | ((c >> 6) & 63),
                128 | (c & 63),
              );
            }
          }

          var version = 1;
          var blockInfo;
          while (version <= 40) {
            blockInfo = BLOCKS[version - 1][ECL[ecLevel]];
            var totalDataCodewords =
              blockInfo[1] * blockInfo[2] +
              (blockInfo[3] || 0) * (blockInfo[4] || 0);
            var dataBits = (totalDataCodewords - (version < 10 ? 1 : 2)) * 8;
            if (bytes.length <= dataBits / 8) break;
            version++;
          }

          if (version > 40) {
            throw new Error("Text too long for QR code");
          }

          var qr = create(version, ecLevel);

          addFinderPattern(qr, 0, 0);
          addFinderPattern(qr, qr.moduleCount - 7, 0);
          addFinderPattern(qr, 0, qr.moduleCount - 7);

          if (version >= 2) {
            var positions = ALIGNMENT_PATTERNS[version - 1];
            for (var i = 0; i < positions.length; i++) {
              for (var j = 0; j < positions.length; j++) {
                var row = positions[i];
                var col = positions[j];
                if (
                  (row < 9 && col < 9) ||
                  (row < 9 && col > qr.moduleCount - 10) ||
                  (row > qr.moduleCount - 10 && col < 9)
                ) {
                  continue;
                }
                addAlignmentPattern(qr, row, col);
              }
            }
          }

          addTimingPattern(qr);
          addDarkModule(qr);

          var bits = [];
          bits.push(0, 1, 0, 0);

          var ccBits = version < 10 ? 8 : 16;
          for (var i = ccBits - 1; i >= 0; i--) {
            bits.push((bytes.length >> i) & 1);
          }

          for (var i = 0; i < bytes.length; i++) {
            for (var j = 7; j >= 0; j--) {
              bits.push((bytes[i] >> j) & 1);
            }
          }

          var totalDataCodewords =
            blockInfo[1] * blockInfo[2] +
            (blockInfo[3] || 0) * (blockInfo[4] || 0);
          var totalBits = totalDataCodewords * 8;

          for (var i = 0; i < 4 && bits.length < totalBits; i++) {
            bits.push(0);
          }

          while (bits.length % 8 !== 0 && bits.length < totalBits) {
            bits.push(0);
          }

          var padIdx = 0;
          while (bits.length < totalBits) {
            var pad = padIdx % 2 === 0 ? PAD0 : PAD1;
            for (var j = 7; j >= 0; j--) {
              bits.push((pad >> j) & 1);
            }
            padIdx++;
          }

          var dataCodewords = [];
          for (var i = 0; i < bits.length; i += 8) {
            var byte = 0;
            for (var j = 0; j < 8; j++) {
              byte = (byte << 1) | (bits[i + j] || 0);
            }
            dataCodewords.push(byte);
          }

          var ecCodewordsPerBlock = blockInfo[0];
          var blocksGroup1 = blockInfo[1];
          var dataCodewordsGroup1 = blockInfo[2];
          var blocksGroup2 = blockInfo[3] || 0;
          var dataCodewordsGroup2 = blockInfo[4] || 0;

          var blocks = [];
          var offset = 0;

          for (var i = 0; i < blocksGroup1; i++) {
            var blockData = dataCodewords.slice(
              offset,
              offset + dataCodewordsGroup1,
            );
            offset += dataCodewordsGroup1;
            var ecData = rsEncode(blockData, ecCodewordsPerBlock);
            blocks.push({ data: blockData, ec: ecData });
          }

          for (var i = 0; i < blocksGroup2; i++) {
            var blockData = dataCodewords.slice(
              offset,
              offset + dataCodewordsGroup2,
            );
            offset += dataCodewordsGroup2;
            var ecData = rsEncode(blockData, ecCodewordsPerBlock);
            blocks.push({ data: blockData, ec: ecData });
          }

          var finalBits = [];
          var maxDataLength = Math.max(
            dataCodewordsGroup1,
            dataCodewordsGroup2,
          );

          for (var i = 0; i < maxDataLength; i++) {
            for (var j = 0; j < blocks.length; j++) {
              if (i < blocks[j].data.length) {
                for (var k = 7; k >= 0; k--) {
                  finalBits.push((blocks[j].data[i] >> k) & 1);
                }
              }
            }
          }

          for (var i = 0; i < ecCodewordsPerBlock; i++) {
            for (var j = 0; j < blocks.length; j++) {
              for (var k = 7; k >= 0; k--) {
                finalBits.push((blocks[j].ec[i] >> k) & 1);
              }
            }
          }

          var maskPattern = getBestMaskPattern(qr, finalBits);

          placeData(qr, finalBits, maskPattern);

          addFormatInfo(qr, ECL[ecLevel], maskPattern);

          addVersionInfo(qr);

          return qr;
        }

        function toDataURL(qr, size, margin) {
          size = size || 200;
          margin = margin || 4;

          var cellSize = Math.floor((size - margin * 2) / qr.moduleCount);
          var actualSize = cellSize * qr.moduleCount + margin * 2;

          var canvas = document.createElement("canvas");
          canvas.width = actualSize;
          canvas.height = actualSize;
          var ctx = canvas.getContext("2d");

          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, actualSize, actualSize);

          ctx.fillStyle = "#000000";
          for (var row = 0; row < qr.moduleCount; row++) {
            for (var col = 0; col < qr.moduleCount; col++) {
              if (qr.modules[row][col]) {
                ctx.fillRect(
                  margin + col * cellSize,
                  margin + row * cellSize,
                  cellSize,
                  cellSize,
                );
              }
            }
          }

          return canvas.toDataURL("image/png");
        }

        return {
          encode: encode,
          toDataURL: toDataURL,
        };
      })();

      function generateQR(text, containerId, statusId) {
        try {
          var qr = QRCode.encode(text, "M");
          var dataUrl = QRCode.toDataURL(qr, 200, 4);

          var img = document.createElement("img");
          img.src = dataUrl;
          img.style.width = "200px";
          img.style.height = "200px";

          var container = document.getElementById(containerId);
          container.innerHTML = "";
          container.appendChild(img);

          document.getElementById(statusId).className = "status success";
          document.getElementById(statusId).textContent =
            "Generated successfully! Version: " +
            qr.typeNumber +
            ", Size: " +
            qr.moduleCount +
            "x" +
            qr.moduleCount;
        } catch (e) {
          document.getElementById(statusId).className = "status error";
          document.getElementById(statusId).textContent = "Error: " + e.message;
        }
      }

      function generateCustom() {
        var text = document.getElementById("customText").value;
        generateQR(text, "customQR", "customStatus");
      }

      // Run tests on load
      window.onload = function () {
        generateQR("Hello World!", "test1", "status1");
        generateQR("https://github.com/example/repo", "test2", "status2");
        generateQR("Hello world! This is a test", "test3", "status3");
      };
    </script>
  </body>
</html>
