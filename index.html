<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cliporax</title>
    <style>
      /* Inline critical styles to prevent flash of unstyled content */
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
      }
      /* Initialize with dark theme, will be overridden by React theme context */
      html.dark {
        color-scheme: dark;
      }
      html:not(.dark) {
        color-scheme: light;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
